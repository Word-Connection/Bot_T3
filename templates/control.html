<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot T3 — Panel de Control</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3250;
    --accent: #4f6ef7; --accent-h: #6b85ff; --green: #22c55e; --red: #ef4444;
    --yellow: #f59e0b; --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
  .topbar { grid-column: 1/-1; display: flex; align-items: center; gap: 14px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); }
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* Topbar */
  .topbar h1 { font-size: 16px; font-weight: 600; color: var(--accent-h); }
  .topbar h1 span { color: var(--muted); font-weight: 400; }
  .status-badge { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
  .badge-detenido  { background: rgba(100,116,139,.15); color: var(--muted); }
  .badge-detenido  .dot { background: var(--muted); }
  .badge-esperando { background: rgba(245,158,11,.1); color: var(--yellow); }
  .badge-esperando .dot { background: var(--yellow); animation: pulse 1s infinite; }
  .badge-ejecutando { background: rgba(34,197,94,.1); color: var(--green); }
  .badge-ejecutando .dot { background: var(--green); animation: pulse 1.5s infinite; }
  .badge-error { background: rgba(239,68,68,.1); color: var(--red); }
  .badge-error .dot { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .uptime { margin-left: auto; font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .countdown-chip { background: rgba(245,158,11,.15); color: var(--yellow); padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; display: none; }

  /* Sidebar sections */
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }

  /* Buttons */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
  .btn-danger  { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,.25); }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background: var(--border); }
  .btn-full { grid-column: 1/-1; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .toggle-label { font-size: 13px; }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: .2s; }
  .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider:before { transform: translateX(18px); }

  /* Form */
  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .form-group input, .form-group select {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .save-btn { width: 100%; margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: .5px; }
  .tab.active { color: var(--accent-h); border-bottom-color: var(--accent); }
  .tab-pane { display: none; padding: 16px; }
  .tab-pane.active { display: block; }

  /* Log console */
  .log-console { flex: 1; background: #0a0c12; overflow-y: auto; padding: 12px 16px; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; line-height: 1.7; }
  .log-line { color: #94a3b8; }
  .log-line.err  { color: #f87171; }
  .log-line.warn { color: var(--yellow); }
  .log-line.ok   { color: var(--green); }
  .log-actions { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: var(--surface); border-top: 1px solid var(--border); }
  .log-actions label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; z-index: 999; }
  #toast.ok  { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  #toast.err { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }

  code { font-family: 'Consolas', monospace; font-size: 11px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--accent-h); }
  .hint { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <h1>Bot T3 <span>Panel de Control</span></h1>
    <div class="status-badge badge-detenido" id="statusBadge">
      <div class="dot"></div>
      <span id="statusText">Detenido</span>
    </div>
    <span class="countdown-chip" id="countdownChip">&#9201; <span id="countdownNum">0</span>s</span>
    <span class="uptime" id="uptime">00:00:00</span>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Acciones -->
    <div class="sidebar-section">
      <h2>Acciones</h2>
      <div class="action-grid">
        <button class="btn btn-primary btn-full" id="btnStart" onclick="startWorker()">
          &#9654; Iniciar Worker
        </button>
        <button class="btn btn-danger btn-full" id="btnStop" onclick="stopWorker()" disabled>
          &#9632; Detener
        </button>
        <button class="btn btn-ghost" onclick="openT3Manual()" title="Abrir T3 y hacer login automatico">
          Abrir T3
        </button>
        <button class="btn btn-ghost" onclick="gitPull()">
          &#8595; Git Pull
        </button>
      </div>
      <div class="toggle-row" style="margin-top:10px">
        <span class="toggle-label">Abrir T3 al iniciar worker</span>
        <label class="toggle">
          <input type="checkbox" id="chkOpenT3">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Config tabs -->
    <div class="sidebar-section" style="padding-bottom:0">
      <h2>Configuracion</h2>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('worker')">Worker</div>
        <div class="tab" onclick="switchTab('modo')">Modo</div>
      </div>
    </div>

    <!-- TAB: Worker -->
    <div class="tab-pane active" id="tab-worker">
      <div class="form-group">
        <label>PC_ID (nombre del worker)</label>
        <input id="cfg_PC_ID" type="text" placeholder="VM_01">
      </div>
      <div class="form-group">
        <label>Tipo de Worker</label>
        <select id="cfg_WORKER_TYPE">
          <option value="deudas">deudas</option>
          <option value="movimientos">movimientos</option>
          <option value="pin">pin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Backend URL</label>
        <input id="cfg_BACKEND_URL" type="text" placeholder="http://192.168.9.160:8000">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input id="cfg_API_KEY" type="text" placeholder="lucas123">
      </div>
      <div class="form-group">
        <label>Log Level</label>
        <select id="cfg_LOG_LEVEL">
          <option value="DEBUG">DEBUG</option>
          <option value="INFO" selected>INFO</option>
          <option value="WARNING">WARNING</option>
        </select>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Modo Admin</span>
        <label class="toggle">
          <input type="checkbox" id="cfg_WORKER_ADMIN_chk">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn btn-primary save-btn" onclick="saveConfig()">Guardar configuracion</button>
    </div>

    <!-- TAB: Modo (solo afecta worker tipo deudas, no admin) -->
    <div class="tab-pane" id="tab-modo">
      <p class="hint">Solo aplica cuando el worker es tipo <code>deudas</code> y no esta en modo admin.</p>
      <div class="form-group">
        <label>Modo de consulta</label>
        <select id="modo_select" onchange="toggleUmbral()">
          <option value="normal">Normal (score + deudas completas)</option>
          <option value="validacion">Validacion (umbral de deudas)</option>
        </select>
      </div>
      <div class="form-group" id="umbral_group" style="display:none">
        <label>Umbral de deudas (ARS)</label>
        <input id="modo_umbral" type="number" min="0" step="1000" placeholder="60000">
      </div>
      <p class="hint" id="umbral_hint" style="display:none">Si la suma supera el umbral, el sistema reporta score 98 directamente sin mostrar deudas.</p>
      <button class="btn btn-primary save-btn" onclick="saveModo()">Guardar modo</button>
    </div>

  </aside>

  <!-- Main: Logs -->
  <main class="main">
    <div class="log-console" id="logConsole"></div>
    <div class="log-actions">
      <label>
        <input type="checkbox" id="chkAutoScroll" checked>
        Auto-scroll
      </label>
      <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="clearLogs()">Limpiar</button>
    </div>
  </main>

</div>

<div id="toast"></div>

<script>
// ─── Estado ────────────────────────────────────────────────
let eventSource = null;

// ─── Arranque ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  loadModoConfig();
  connectSSE();
  setInterval(pollStatus, 2000);
});

// ─── SSE: stream de logs en tiempo real ────────────────────
function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/logs/stream');
  eventSource.onmessage = e => appendLog(e.data);
  eventSource.onerror = () => setTimeout(connectSSE, 3000);
}

// ─── Polling solo para estado (no para logs) ────────────────
async function pollStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    applyStatus(d.status, d.uptime, d.countdown);
  } catch {}
}

function applyStatus(status, uptime, countdown) {
  const badge = document.getElementById('statusBadge');
  const txt   = document.getElementById('statusText');
  const labels = { detenido: 'Detenido', esperando: 'Iniciando...', ejecutando: 'Ejecutando', error: 'Error' };
  badge.className = 'status-badge badge-' + status;
  txt.textContent = labels[status] || status;
  document.getElementById('uptime').textContent = uptime || '00:00:00';

  const chip = document.getElementById('countdownChip');
  if (status === 'esperando' && countdown > 0) {
    chip.style.display = 'inline-flex';
    document.getElementById('countdownNum').textContent = countdown;
  } else {
    chip.style.display = 'none';
  }

  document.getElementById('btnStart').disabled = (status === 'ejecutando' || status === 'esperando');
  document.getElementById('btnStop').disabled  = (status === 'detenido');
}

// ─── Logs ──────────────────────────────────────────────────
function appendLog(msg) {
  const el  = document.getElementById('logConsole');
  const div = document.createElement('div');
  const up  = msg.toUpperCase();
  div.className = 'log-line' +
    (up.includes('ERROR') ? ' err' : up.includes('WARNING') || up.includes('WARN') ? ' warn' :
     (up.includes('OK') || up.includes('CORREC') || up.includes('INICI') || msg.includes('✓')) ? ' ok' : '');
  div.textContent = msg;
  el.appendChild(div);
  if (document.getElementById('chkAutoScroll').checked) el.scrollTop = el.scrollHeight;
}

function clearLogs() { document.getElementById('logConsole').innerHTML = ''; }

// ─── Config ────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const { config: c } = await r.json();
    setVal('cfg_PC_ID',       c.PC_ID);
    setVal('cfg_BACKEND_URL', c.BACKEND_URL);
    setVal('cfg_API_KEY',     c.API_KEY);
    setVal('cfg_LOG_LEVEL',   c.LOG_LEVEL);
    document.getElementById('cfg_WORKER_TYPE').value = c.WORKER_TYPE || 'deudas';
    document.getElementById('cfg_WORKER_ADMIN_chk').checked = ['true','1','yes'].includes((c.WORKER_ADMIN||'').toLowerCase());
  } catch (e) { console.error('loadConfig', e); }
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el && val !== undefined) el.value = val;
}

async function saveConfig() {
  const payload = {
    PC_ID:       v('cfg_PC_ID'),
    WORKER_TYPE: document.getElementById('cfg_WORKER_TYPE').value,
    BACKEND_URL: v('cfg_BACKEND_URL'),
    API_KEY:     v('cfg_API_KEY'),
    WORKER_ADMIN:document.getElementById('cfg_WORKER_ADMIN_chk').checked ? 'true' : 'false',
    LOG_LEVEL:   document.getElementById('cfg_LOG_LEVEL').value,
  };
  try {
    const r = await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const d = await r.json();
    toast(d.ok ? 'Configuracion guardada' : d.msg, d.ok ? 'ok' : 'err');
  } catch { toast('Error de red', 'err'); }
}

function v(id) { return (document.getElementById(id) || {}).value?.trim() || ''; }

// ─── Acciones ──────────────────────────────────────────────
async function startWorker() {
  const openT3 = document.getElementById('chkOpenT3').checked;
  try {
    const r = await fetch('/api/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ open_t3: openT3 }) });
    const d = await r.json();
    toast(d.msg, d.ok ? 'ok' : 'err');
  } catch { toast('Error', 'err'); }
}

async function stopWorker() {
  try {
    const r = await fetch('/api/stop', { method:'POST' });
    const d = await r.json();
    toast(d.msg, d.ok ? 'ok' : 'err');
  } catch { toast('Error', 'err'); }
}

async function openT3Manual() {
  try {
    const r = await fetch('/api/open_t3', { method:'POST' });
    const d = await r.json();
    toast(d.msg, d.ok ? 'ok' : 'err');
  } catch { toast('Error', 'err'); }
}

async function gitPull() {
  toast('Actualizando...', 'ok');
  try {
    const r = await fetch('/api/git_pull', { method:'POST' });
    const d = await r.json();
    toast(d.msg, d.ok ? 'ok' : 'err');
  } catch { toast('Error', 'err'); }
}

// ─── Tabs ──────────────────────────────────────────────────
function switchTab(name) {
  const order = ['worker', 'modo'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', order[i] === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
}

// ─── Modo config ───────────────────────────────────────────────
async function loadModoConfig() {
  try {
    const r = await fetch('/api/modo');
    const { modo: cfg } = await r.json();
    document.getElementById('modo_select').value = cfg.modo || 'normal';
    document.getElementById('modo_umbral').value = cfg.umbral ?? 60000;
    toggleUmbral();
  } catch (e) { console.error('loadModoConfig', e); }
}

function toggleUmbral() {
  const esVal = document.getElementById('modo_select').value === 'validacion';
  document.getElementById('umbral_group').style.display = esVal ? 'block' : 'none';
  document.getElementById('umbral_hint').style.display  = esVal ? 'block' : 'none';
}

async function saveModo() {
  const payload = {
    modo: document.getElementById('modo_select').value,
    umbral: parseFloat(document.getElementById('modo_umbral').value) || 60000,
  };
  try {
    const r = await fetch('/api/modo', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const d = await r.json();
    toast(d.ok ? 'Modo guardado' : d.msg, d.ok ? 'ok' : 'err');
  } catch { toast('Error de red', 'err'); }
}

// ─── Toast ─────────────────────────────────────────────────
let _tt;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type; el.style.display = 'block';
  clearTimeout(_tt); _tt = setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>
